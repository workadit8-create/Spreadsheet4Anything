<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Akuntansi Ops Console</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --sandbox: #22c55e;
      --demo: #f59e0b;
      --production: #ef4444;
      --warn-bg: #422006;
      --warn-border: #b45309;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 3rem;
    }

    header {
      margin-bottom: 1.75rem;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 0.35rem;
    }

    .meta-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.25rem;
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .meta-bar a {
      color: var(--accent);
      text-decoration: none;
    }

    .meta-bar a:hover { text-decoration: underline; }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .card-head h2 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .slug {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: ui-monospace, monospace;
    }

    .badge {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge.sandbox { background: rgba(34, 197, 94, 0.15); color: var(--sandbox); }
    .badge.demo { background: rgba(245, 158, 11, 0.15); color: var(--demo); }
    .badge.production { background: rgba(239, 68, 68, 0.15); color: var(--production); }
    .badge.client { background: rgba(139, 156, 179, 0.15); color: var(--muted); }

    .links-primary {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.65rem 0.85rem;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.15s, background 0.15s;
    }

    .btn:hover {
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.08);
    }

    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn.primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .btn.disabled {
      opacity: 0.45;
      pointer-events: none;
    }

    .btn-icon {
      width: 1.1rem;
      text-align: center;
      opacity: 0.85;
    }

    .links-extra {
      border-top: 1px solid var(--border);
      padding-top: 0.75rem;
    }

    .links-extra summary {
      font-size: 0.78rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }

    .links-extra .btn {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      padding: 0.5rem 0.75rem;
    }

    .status {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .status.ok { color: var(--sandbox); }
    .status.warn { color: var(--demo); }

    .alert {
      background: var(--warn-bg);
      border: 1px solid var(--warn-border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
    }

    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.4);
      border-radius: 8px;
      padding: 1rem;
      color: #fca5a5;
    }

    .loading { color: var(--muted); padding: 2rem 0; }

    footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1 id="title">Akuntansi Ops Console</h1>
      <p>Registry &amp; quick links — semua akun dalam satu tempat.</p>
      <div class="meta-bar" id="meta-bar" hidden></div>
    </header>

    <div id="alert-box" hidden class="alert"></div>
    <div id="content"><p class="loading">Memuat registry…</p></div>

    <footer>
      Fase 1 — links only · Deploy &amp; QA dari web menyusul
    </footer>
  </div>

  <script>
    const TIER_LABEL = {
      sandbox: "Sandbox",
      demo: "Demo",
      production: "Production",
      client: "Client",
    };

    function formatSyncedAt(iso) {
      if (!iso) return "—";
      try {
        return new Date(iso).toLocaleString("id-ID", {
          dateStyle: "medium",
          timeStyle: "short",
        });
      } catch {
        return iso;
      }
    }

    function linkBtn(href, label, icon, primary) {
      if (!href) {
        return `<span class="btn disabled"><span class="btn-icon">${icon}</span>${label} (belum diisi)</span>`;
      }
      const cls = primary ? "btn primary" : "btn";
      return `<a class="${cls}" href="${href}" target="_blank" rel="noopener noreferrer"><span class="btn-icon">${icon}</span>${label}</a>`;
    }

    function renderCard(slug, client) {
      const tier = client.tier || "client";
      const tierLabel = TIER_LABEL[tier] || tier;
      const statusCls = client.ready ? "ok" : "warn";
      const statusText = client.ready ? "3 link utama siap" : "Beberapa link belum lengkap — jalankan sync-client-registry";

      return `
        <article class="card">
          <div class="card-head">
            <div>
              <h2>${escapeHtml(client.label)}</h2>
              <div class="slug">${escapeHtml(slug)}</div>
            </div>
            <span class="badge ${tier}">${tierLabel}</span>
          </div>
          <div class="links-primary">
            ${linkBtn(client.links.webapp, "Web App Akuntansi", "📱", true)}
            ${linkBtn(client.links.database, "Spreadsheet Database", "📊", false)}
            ${linkBtn(client.links.backend, "Backend Web App", "⚙️", false)}
          </div>
          <details class="links-extra">
            <summary>Drive &amp; backend engine</summary>
            ${linkBtn(client.extras?.clientFolder, "Folder Client", "📁", false)}
            ${linkBtn(client.extras?.uploadsFolder, "Folder Uploads", "📎", false)}
            ${linkBtn(client.extras?.backendEngine, "Spreadsheet Backend Engine", "🗄️", false)}
          </details>
          <div class="status ${statusCls}">${statusText}</div>
        </article>
      `;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function renderMeta(meta) {
      const parts = [
        `<span>Sync: <strong>${formatSyncedAt(meta.syncedAt)}</strong></span>`,
      ];
      if (meta.gitHead) {
        parts.push(`<span>Git: <code>${escapeHtml(meta.gitHead)}</code></span>`);
      }
      if (meta.rootFolder) {
        parts.push(`<span>Drive root: <a href="${meta.rootFolder}" target="_blank" rel="noopener">${escapeHtml(meta.rootFolderName || "Akuntansi App")}</a></span>`);
      }
      return parts.join("");
    }

    function incompleteClients(clients) {
      return Object.entries(clients).filter(([, c]) => !c.ready);
    }

    async function load() {
      const content = document.getElementById("content");
      try {
        const res = await fetch("client-registry.json", { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        if (data.meta?.title) {
          document.getElementById("title").textContent = data.meta.title;
          document.title = data.meta.title;
        }

        const metaBar = document.getElementById("meta-bar");
        metaBar.innerHTML = renderMeta(data.meta || {});
        metaBar.hidden = false;

        const incomplete = incompleteClients(data.clients || {});
        const alertBox = document.getElementById("alert-box");
        if (incomplete.length) {
          const names = incomplete.map(([s, c]) => c.label || s).join(", ");
          alertBox.textContent = `Perhatian: link belum lengkap untuk ${names}. Pastikan client.env ada lalu jalankan ./scripts/sync-client-registry.sh`;
          alertBox.hidden = false;
        }

        const entries = Object.entries(data.clients || {});
        if (!entries.length) {
          content.innerHTML = `<div class="error">Registry kosong. Jalankan <code>./scripts/sync-client-registry.sh</code> lalu refresh.</div>`;
          return;
        }

        content.innerHTML = `<div class="cards">${entries.map(([slug, c]) => renderCard(slug, c)).join("")}</div>`;
      } catch (err) {
        content.innerHTML = `<div class="error">Gagal memuat client-registry.json: ${escapeHtml(err.message)}<br><br>Jalankan sync lalu buka via local server (<code>ops/serve.sh</code>) atau deploy GitHub Pages.</div>`;
      }
    }

    load();
  </script>
</body>
</html>
